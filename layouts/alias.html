<!DOCTYPE html>
<html lang="{{ site.Language.Lang | default "es" }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{{ site.Title }}</title>
    <link rel="canonical" href="{{ .Permalink }}">
    <meta http-equiv="refresh" content="0; url={{ .Permalink }}">
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(82, 94, 122, 0.18), transparent 40%),
          linear-gradient(180deg, #f7f8fb 0%, #eceff6 100%);
        color: #1f2937;
      }

      .alias-card {
        width: min(100%, 560px);
        padding: 28px 24px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(15, 23, 42, 0.08);
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        text-align: center;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.5rem, 4vw, 2rem);
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #475569;
      }

      a {
        color: inherit;
        font-weight: 600;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background:
            radial-gradient(circle at top, rgba(148, 163, 184, 0.12), transparent 40%),
            linear-gradient(180deg, #111827 0%, #020617 100%);
          color: #e5e7eb;
        }

        .alias-card {
          background: rgba(15, 23, 42, 0.82);
          border-color: rgba(148, 163, 184, 0.16);
          box-shadow: 0 18px 40px rgba(2, 6, 23, 0.35);
        }

        p {
          color: #cbd5e1;
        }
      }
    </style>
    <script>
      window.location.replace({{ printf "%q" .Permalink | safeJS }});
    </script>
  </head>
  <body>
    <main class="alias-card">
      <h1>{{ site.Title }}</h1>
      <p>
        {{ if eq site.Language.Lang "en" }}Redirecting to{{ else }}Redirigiendo a{{ end }}
        <a href="{{ .Permalink }}">{{ .Permalink }}</a>
      </p>
    </main>
  </body>
</html>
