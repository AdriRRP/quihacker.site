description = "Bitácora técnica de Adrian \"Quihacker\" Ramos sobre Rust, hardware hacking, arquitectura de software, ciberseguridad ofensiva e IA pragmática."
author = "Adrian Ramos"
keywords = ["Rust", "hardware hacking", "ESP32", "software architecture", "cybersecurity", "event sourcing", "DDD", "AI"]

label.icon = "/images/logo.png"
label.iconHeight = 45

ShowBreadCrumbs = true
ShowPostNavLinks = true
ShowCodeCopyButtons = true
ShowRssButtonInSectionTermList = true

[assets]
favicon          = "/favicon.ico"
favicon16x16     = "/favicon-16x16.png"
favicon32x32     = "/favicon-32x32.png"
apple_touch_icon = "/apple-touch-icon.png"
safari_pinned_tab = "/favicon-32x32.png"

[schema]
publisherType = "Person"
publisherName = "Adrian Ramos"
sameAs = [
  "https://www.linkedin.com/in/adrian-ramos-rp",
  "https://github.com/AdriRRP",
]

[profileMode]
enabled = true
imageUrl = "/images/landing.png"
imageTitle = "Quihacker & Sancho (toolkit)"
imageWidth = 300
imageHeight = 300

[params.fuseOpts]
isCaseSensitive = false
shouldSort      = true
distance        = 1000
threshold       = 0.3
minMatchCharLength = 2
keys = ["title", "permalink", "summary", "content"]

[[socialIcons]]
name = "LinkedIn"
url = "https://www.linkedin.com/in/adrian-ramos-rp"

[[socialIcons]]
name = "GitHub"
url = "https://github.com/AdriRRP"
